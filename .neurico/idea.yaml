idea:
  title: The "No Costume Theories" Rule
  domain: theory
  hypothesis: 'Theories of consciousness that rely solely on representational distinctions,
    without corresponding behavioral tests, are essentially aesthetic and should not
    be accepted; all meaningful distinctions must be behaviorally testable.

    '
  background:
    description: 'Fundamentally, I don''t think we should accept purely-representational
      theories. For instance, related to recent discussion I had with a friend, I
      don''t think we should have any theories of consciousness where you can be convinced
      a person is conscious, but then a robot takes off its human costume and then
      you now think it isn''t conscious. This does not mean that we can''t accept
      that people can be fooled, they certainly can be. It''s to say that all distinctions,
      even if they are hypothesized representationally, must lead to some kind of
      behavioral test. If they do not, they are essentially aesthetic theories.

      '
  metadata:
